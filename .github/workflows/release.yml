# .github/workflows/release.yml
#
# Triggered when release-please merges a release PR and pushes a vX.Y.Z tag.
# Builds and publishes two OCI images to ghcr.io:
#
#   ghcr.io/vigil-soc/vigil-backend:<tag>   (FastAPI API + bundled SPA)
#   ghcr.io/vigil-soc/vigil-daemon:<tag>    (headless SOC daemon)
#
# The llm-worker Deployment reuses the backend image (different command),
# so no third image is needed.
#
# Prerequisites (one-time, per RELEASING.md):
#   • GitHub App installed with id=vars.RELEASE_PLEASE_APP_ID
#     and private key at secrets.RELEASE_PLEASE_PRIVATE_KEY
#   • "Read and write" Packages permission on the repo
#     (Settings → Actions → General → Workflow permissions)

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # only vX.Y.Z tags from release-please

# Least-privilege defaults; each job overrides what it needs.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the release version once, for every downstream job.
  # The pushed image tags use docker/metadata-action's {{version}}, which
  # strips the leading "v" (vX.Y.Z → X.Y.Z). github.ref_name keeps the "v",
  # so jobs that pull/inspect the images must use this stripped value or they
  # reference a tag that was never pushed.
  # ---------------------------------------------------------------------------
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build + push: backend (also used by llm-worker)
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: read
      packages: write          # push to ghcr.io
      id-token: write          # keyless cosign signing (future)

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vigil-soc/vigil-backend
          tags: |
            # vX.Y.Z → X.Y.Z (strip leading v)
            type=semver,pattern={{version}}
            # vX.Y.Z → X.Y (minor)
            type=semver,pattern={{major}}.{{minor}}
            # short SHA for traceability
            type=sha,prefix=sha-
            # latest on default branch tags
            type=raw,value=latest,enable=${{ github.ref == format('refs/tags/v{0}', needs.version.outputs.version) }}
          labels: |
            org.opencontainers.image.title=vigil-backend
            org.opencontainers.image.description=Vigil SOC — FastAPI backend + bundled SPA
            org.opencontainers.image.vendor=Vigil-SOC
            org.opencontainers.image.source=https://github.com/Vigil-SOC/vigil
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the registry — free for public repos
          cache-from: type=registry,ref=ghcr.io/vigil-soc/vigil-backend:buildcache
          cache-to:   type=registry,ref=ghcr.io/vigil-soc/vigil-backend:buildcache,mode=max
          # Pass the version into the image
          build-args: |
            VIGIL_VERSION=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # Build + push: daemon
  # ---------------------------------------------------------------------------
  build-daemon:
    name: Build daemon image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vigil-soc/vigil-daemon
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=vigil-daemon
            org.opencontainers.image.description=Vigil SOC — headless autonomous SOC daemon
            org.opencontainers.image.vendor=Vigil-SOC
            org.opencontainers.image.source=https://github.com/Vigil-SOC/vigil
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push daemon
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.daemon
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/vigil-soc/vigil-daemon:buildcache
          cache-to:   type=registry,ref=ghcr.io/vigil-soc/vigil-daemon:buildcache,mode=max
          build-args: |
            VIGIL_VERSION=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # Smoke-test: pull the images and verify they start
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke test images
    runs-on: ubuntu-latest
    needs: [version, build-backend, build-daemon]
    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend — version check
        run: |
          docker run --rm \
            -e DEV_MODE=true \
            -e DATABASE_URL=postgresql://x:x@localhost/x \
            -e REDIS_URL=redis://localhost:6379 \
            ghcr.io/vigil-soc/vigil-backend:${{ needs.version.outputs.version }} \
            python -c "import backend; print('backend version:', backend.__version__)"

      - name: Backend — SPA present
        run: |
          docker run --rm \
            ghcr.io/vigil-soc/vigil-backend:${{ needs.version.outputs.version }} \
            test -f /app/frontend/build/index.html \
            || { echo "::error::SPA missing from image — frontend not copied to /app/frontend/build"; exit 1; }

      - name: Daemon — import check
        run: |
          docker run --rm \
            -e DEV_MODE=true \
            ghcr.io/vigil-soc/vigil-daemon:${{ needs.version.outputs.version }} \
            python -c "import daemon; print('daemon ok')"

  # ---------------------------------------------------------------------------
  # Attach image digests to the GitHub Release
  # ---------------------------------------------------------------------------
  update-release:
    name: Annotate GitHub Release
    runs-on: ubuntu-latest
    needs: [version, smoke-test]
    permissions:
      contents: write    # edit release body
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch digests
        id: digests
        run: |
          BACKEND=$(docker manifest inspect ghcr.io/vigil-soc/vigil-backend:${{ needs.version.outputs.version }} \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(m.get('config',{}).get('digest','unknown'))")
          DAEMON=$(docker manifest inspect ghcr.io/vigil-soc/vigil-daemon:${{ needs.version.outputs.version }} \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(m.get('config',{}).get('digest','unknown'))")
          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "daemon=$DAEMON"   >> "$GITHUB_OUTPUT"

      - name: Append image refs to release notes
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          body: |

            ---
            ### Container Images

            | Image | Tag | Digest |
            |-------|-----|--------|
            | `ghcr.io/vigil-soc/vigil-backend` | `${{ needs.version.outputs.version }}` | `${{ steps.digests.outputs.backend }}` |
            | `ghcr.io/vigil-soc/vigil-daemon`  | `${{ needs.version.outputs.version }}` | `${{ steps.digests.outputs.daemon }}`  |

            ```bash
            # Pull by tag
            docker pull ghcr.io/vigil-soc/vigil-backend:${{ needs.version.outputs.version }}
            docker pull ghcr.io/vigil-soc/vigil-daemon:${{ needs.version.outputs.version }}
            ```
