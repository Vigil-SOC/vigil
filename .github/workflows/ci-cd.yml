name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allows manual triggering from GitHub UI

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Linting & Code Quality
  # ============================================================================
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
      
      - name: Run flake8
        run: flake8 backend/ services/ daemon/ database/ core/ --max-line-length=120 --exclude=venv,__pycache__
        continue-on-error: true
      
      - name: Run black
        run: black --check backend/ services/ daemon/ database/ core/ --exclude=venv
        continue-on-error: true
      
      - name: Run isort
        run: isort --check-only backend/ services/ daemon/ database/ core/
        continue-on-error: true
      
      - name: Run mypy
        run: mypy backend/ services/ --ignore-missing-imports
        continue-on-error: true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

  lint-docker:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.backend
          ignore: DL3008,DL3009
        continue-on-error: true

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test-unit-backend:
    name: Unit Tests - Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests
        run: |
          # Exclude tests needing external services (e.g. PostgreSQL) — the unit
          # job runs without them. Such tests are marked @pytest.mark.external_service.
          pytest tests/unit/ -m "not external_service" -v --cov=backend --cov=services --cov=daemon --cov-report=xml --cov-report=term
        env:
          TESTING: "true"
          CLAUDE_API_KEY: ${{ secrets.CLAUDEAPI }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDEAPI }}
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: backend-unit
        continue-on-error: true

  test-unit-frontend:
    name: Unit Tests - Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run unit tests
        working-directory: frontend
        run: npm run test:unit || echo "Frontend tests not yet implemented"
        continue-on-error: true

  # ============================================================================
  # Integration Tests
  # ============================================================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: deeptempo_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TESTING: "true"
      DEV_MODE: "true"
      SECRET_KEY: "test-secret-key"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: deeptempo_test

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enable Postgres extensions
        run: |
          PGPASSWORD=test psql -h localhost -p 5432 -U test -d deeptempo_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Initialize schema
        run: |
          python -c "from database.connection import init_database; init_database()"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --cov=backend --cov-report=xml
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDEAPI }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDEAPI }}

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: integration
          name: backend-integration
        continue-on-error: true

  # ============================================================================
  # DB-backed Unit Tests (require PostgreSQL)
  # ============================================================================
  test-unit-backend-db:
    name: Unit Tests - Backend (DB-backed)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: deeptempo_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TESTING: "true"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: deeptempo_test
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enable Postgres extensions
        run: |
          PGPASSWORD=test psql -h localhost -p 5432 -U test -d deeptempo_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Initialize schema
        run: |
          python -c "from database.connection import init_database; init_database()"

      - name: Run DB-backed unit tests
        run: |
          # Complement of the no-service unit job: only @pytest.mark.external_service
          # tests, which require a real PostgreSQL.
          pytest tests/unit/ -m external_service -v --no-cov

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security-scan-python:
    name: Security Scan - Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit
        run: bandit -r backend/ services/ daemon/ -f json -o bandit-report.json || true
      
      - name: Upload Bandit results
        uses: actions/upload-artifact@v5
        with:
          name: bandit-report
          path: bandit-report.json
        continue-on-error: true

  security-scan-npm:
    name: Security Scan - NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-unit-backend, test-unit-backend-db, test-integration]
    if: false  # Disabled - enable if you need Docker images
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata (daemon)
        id: meta-daemon
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-daemon
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
      
      - name: Build and push daemon image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.daemon
          push: true
          tags: ${{ steps.meta-daemon.outputs.tags }}
          labels: ${{ steps.meta-daemon.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Build Frontend Assets
  # ============================================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ============================================================================
  # Scan Docker Images for Vulnerabilities
  # ============================================================================
  scan-images:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    needs: [build-images]
    if: false  # Disabled - enable by changing to: github.event_name == 'push'
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ============================================================================
  # Deploy to Staging (DISABLED - Only testing enabled)
  # ============================================================================
