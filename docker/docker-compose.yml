version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: deeptempo-postgres
    environment:
      POSTGRES_DB: deeptempo_soc
      POSTGRES_USER: deeptempo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deeptempo_secure_password_change_me}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Path is relative to this compose file (docker/), so ../ points at
      # the repo root where database/init/ actually lives.
      - ../database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deeptempo -d deeptempo_soc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - deeptempo-network

  # Redis - Job queue backend for ARQ (LLM request queuing + session store)
  redis:
    image: redis:7-alpine
    container_name: deeptempo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - deeptempo-network

  # SOC Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: deeptempo-backend
    environment:
      - DATABASE_URL=postgresql://deeptempo:${POSTGRES_PASSWORD:-deeptempo_secure_password_change_me}@postgres:5432/deeptempo_soc
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - BIFROST_URL=${BIFROST_URL:-http://bifrost:8080}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "6987:6987"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deeptempo-network

  # SOC Daemon - Autonomous monitoring and response
  soc-daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.daemon
    container_name: deeptempo-daemon
    environment:
      # Database
      - DATABASE_URL=postgresql://deeptempo:${POSTGRES_PASSWORD:-deeptempo_secure_password_change_me}@postgres:5432/deeptempo_soc
      # AI
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - BIFROST_URL=${BIFROST_URL:-http://bifrost:8080}
      # Redis (LLM queue)
      - REDIS_URL=redis://redis:6379/0
      # Polling intervals (seconds)
      - DAEMON_SPLUNK_POLL_INTERVAL=${DAEMON_SPLUNK_POLL_INTERVAL:-300}
      - DAEMON_CROWDSTRIKE_POLL_INTERVAL=${DAEMON_CROWDSTRIKE_POLL_INTERVAL:-60}
      # Processing
      - DAEMON_AUTO_TRIAGE=${DAEMON_AUTO_TRIAGE:-true}
      - DAEMON_AUTO_ENRICH=${DAEMON_AUTO_ENRICH:-true}
      - DAEMON_BATCH_SIZE=${DAEMON_BATCH_SIZE:-10}
      # Response
      - DAEMON_AUTO_RESPONSE=${DAEMON_AUTO_RESPONSE:-true}
      - DAEMON_CONFIDENCE_THRESHOLD=${DAEMON_CONFIDENCE_THRESHOLD:-0.90}
      - DAEMON_FORCE_APPROVAL=${DAEMON_FORCE_APPROVAL:-false}
      - DAEMON_DRY_RUN=${DAEMON_DRY_RUN:-false}
      # Escalation
      - DAEMON_ESCALATION_ENABLED=${DAEMON_ESCALATION_ENABLED:-true}
      - DAEMON_SLACK_ENABLED=${DAEMON_SLACK_ENABLED:-true}
      - DAEMON_SLACK_CHANNEL=${DAEMON_SLACK_CHANNEL:-#soc-alerts}
      - DAEMON_PAGERDUTY_ENABLED=${DAEMON_PAGERDUTY_ENABLED:-false}
      - DAEMON_ESCALATE_SEVERITIES=${DAEMON_ESCALATE_SEVERITIES:-critical,high}
      # Scheduler
      - DAEMON_THREAT_HUNT_ENABLED=${DAEMON_THREAT_HUNT_ENABLED:-true}
      - DAEMON_THREAT_HUNT_INTERVAL=${DAEMON_THREAT_HUNT_INTERVAL:-86400}
      - DAEMON_CLEANUP_RETENTION_DAYS=${DAEMON_CLEANUP_RETENTION_DAYS:-90}
      # Metrics / Health
      - DAEMON_METRICS_ENABLED=${DAEMON_METRICS_ENABLED:-true}
      - DAEMON_HEALTH_PORT=${DAEMON_HEALTH_PORT:-9091}
      # Webhook
      - DAEMON_WEBHOOK_ENABLED=${DAEMON_WEBHOOK_ENABLED:-true}
      - DAEMON_WEBHOOK_PORT=${DAEMON_WEBHOOK_PORT:-8081}
      # Logging
      - DAEMON_LOG_LEVEL=${DAEMON_LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      # Integrations (loaded from core/config)
      - SPLUNK_URL=${SPLUNK_URL}
      - SPLUNK_USERNAME=${SPLUNK_USERNAME}
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      - CROWDSTRIKE_CLIENT_ID=${CROWDSTRIKE_CLIENT_ID}
      - CROWDSTRIKE_CLIENT_SECRET=${CROWDSTRIKE_CLIENT_SECRET}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY}
      # Kafka ingestion (opt-in; UI toggle at /settings?tab=kafka)
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_CONSUMER_GROUP=${KAFKA_CONSUMER_GROUP:-vigil-soc}
      - KAFKA_TOPICS=${KAFKA_TOPICS:-}
      - KAFKA_AUTO_OFFSET_RESET=${KAFKA_AUTO_OFFSET_RESET:-latest}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_MAX_POLL_RECORDS=${KAFKA_MAX_POLL_RECORDS:-500}
      - KAFKA_SESSION_TIMEOUT_MS=${KAFKA_SESSION_TIMEOUT_MS:-30000}
    ports:
      - "8081:8081"  # Webhook ingestion
      - "9090:9090"  # Prometheus /metrics (OTEL PrometheusMetricReader)
      - "9091:9091"  # Health /health + /status
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deeptempo-network

  # ARQ Worker - Processes LLM requests from the queue
  llm-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: deeptempo-llm-worker
    command: ["python", "-m", "services.run_llm_worker"]
    environment:
      - DATABASE_URL=postgresql://deeptempo:${POSTGRES_PASSWORD:-deeptempo_secure_password_change_me}@postgres:5432/deeptempo_soc
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - BIFROST_URL=${BIFROST_URL:-http://bifrost:8080}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deeptempo-network

  # ─── Multi-provider LLM gateway (opt-in: --profile bifrost) ───────────────
  # Bifrost exposes a unified OpenAI-format API that translates to
  # OpenAI/Anthropic/Ollama/etc. Vigil routes non-Anthropic calls here.
  # Anthropic + extended thinking bypasses Bifrost and hits the SDK directly.
  bifrost:
    image: maximhq/bifrost:latest
    container_name: deeptempo-bifrost
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - ./bifrost/config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - deeptempo-network
    profiles:
      - bifrost

  # PgAdmin for database management (optional, can be commented out in production)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: deeptempo-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@deeptempo.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - deeptempo-network
    profiles:
      - dev  # Only start in dev profile

  # ─── Observability stack (opt-in: --profile observability) ────────────────

  # OpenTelemetry Collector — receives OTLP spans/metrics, fans out to Jaeger + Prometheus
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: deeptempo-otel-collector
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    networks:
      - deeptempo-network
    profiles:
      - observability

  # Jaeger — distributed trace UI
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: deeptempo-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
    networks:
      - deeptempo-network
    profiles:
      - observability

  # Prometheus — scrapes /metrics from daemon and backend
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: deeptempo-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9095:9090"  # Prometheus UI on host port 9095 (avoids conflict with daemon's 9090)
    networks:
      - deeptempo-network
    profiles:
      - observability

  # Grafana — dashboards for system overview, LLM costs, investigation lifecycle
  grafana:
    image: grafana/grafana:10.4.0
    container_name: deeptempo-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"  # Grafana UI
    depends_on:
      - prometheus
    networks:
      - deeptempo-network
    profiles:
      - observability

  # ─── SIEM testing ─────────────────────────────────────────────────────────

  # Splunk Enterprise for SIEM testing
  splunk:
    image: splunk/splunk:latest
    platform: linux/amd64
    container_name: deeptempo-splunk
    hostname: splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=changeme123
      - SPLUNK_HEC_TOKEN=00000000-0000-0000-0000-000000000000
    ports:
      - "6990:8000"   # Web UI
      - "8088:8088"   # HEC (HTTP Event Collector)
      - "8089:8089"   # Management port
      - "9997:9997"   # Forwarder port
    volumes:
      - splunk_data:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
    restart: unless-stopped
    networks:
      - deeptempo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - splunk  # Only start when splunk profile is active

  # ─── Kafka (opt-in: --profile kafka) ─────────────────────────────────────
  # Single-broker KRaft-mode Kafka for local streaming ingestion. See the
  # "Kafka" tab in Settings to enable the consumer and configure topics.
  kafka:
    image: apache/kafka:3.7.0
    container_name: deeptempo-kafka
    hostname: kafka
    ports:
      - "9092:9092"  # External listener (host)
    environment:
      # KRaft single-broker controller/broker combined
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - deeptempo-network
    profiles:
      - kafka

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  splunk_data:
    driver: local
  splunk_etc:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  kafka_data:
    driver: local

networks:
  deeptempo-network:
    driver: bridge

