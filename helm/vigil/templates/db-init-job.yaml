{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vigil.dbInit.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vigil.componentLabels" (dict "context" . "component" "db-init") | nindent 4 }}
  annotations:
    # Run after secrets/configmap are in place but before the app deployments
    # become Ready. Hook-weight negative = earlier execution.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "vigil.componentLabels" (dict "context" . "component" "db-init") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "vigil.serviceAccountName" . }}
      {{- include "vigil.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 70  # postgres user in alpine image
        runAsGroup: 70
      containers:
        - name: db-init
          image: "{{ .Values.dbInit.image.repository }}:{{ .Values.dbInit.image.tag }}"
          imagePullPolicy: {{ .Values.dbInit.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: PGHOST
              value: {{ include "vigil.postgres.host" . }}
            - name: PGPORT
              value: {{ include "vigil.postgres.port" . | quote }}
            - name: PGDATABASE
              value: {{ include "vigil.postgres.database" . }}
            - name: PGUSER
              value: {{ include "vigil.postgres.username" . }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil.postgres.passwordSecret" . }}
                  key: {{ include "vigil.postgres.passwordSecretKey" . }}
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              echo "Waiting for Postgres at $PGHOST:$PGPORT..."
              for i in $(seq 1 60); do
                if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                  echo "Postgres is ready."
                  break
                fi
                sleep 2
              done
              if ! pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                echo "Postgres did not become ready in time." >&2
                exit 1
              fi

              # Create a marker table so we can record which SQL files have
              # already been applied. Safe to run on every install/upgrade.
              psql -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS _vigil_schema_versions (filename TEXT PRIMARY KEY, applied_at TIMESTAMPTZ NOT NULL DEFAULT now());"

              # NOTE: we deliberately do NOT use ON_ERROR_STOP for the migration
              # files. The files under database/init/ include both schema-setup
              # SQL (CREATE EXTENSION, etc.) and per-feature ALTER TABLE
              # migrations that reference tables created later by SQLAlchemy's
              # create_all() on backend startup. docker-compose's
              # /docker-entrypoint-initdb.d runs with the same laxness; treating
              # "relation does not exist" as fatal here would regress parity.
              # The marker table still records what's been applied so idempotency
              # works on upgrade.
              apply() {
                local f="$1"
                # Marker-table check goes FIRST so already-applied filenames
                # short-circuit before the file-existence check below.
                #
                # This ordering matters for `helm upgrade --reuse-values`
                # from v0.1.x: those deployments have ghost rows in
                # _vigil_schema_versions for the phantom
                # 003_add_ai_enrichment.sql / 003_ai_decision_logs.sql
                # entries from the original values.yaml drift. Helm
                # `--reuse-values` reuses the previous release's coalesced
                # values regardless of the new chart's defaults, so those
                # ghost entries persist in dbInit.sqlFiles on first upgrade
                # — and we want them to SKIP cleanly via the marker rather
                # than hard-fail at the file check. The marker says "the
                # cluster already accepted these as applied," which is
                # exactly the contract upgrade-time idempotency relies on.
                # See database/init/README.md for the reserved-filenames
                # warning that prevents these names being reused.
                local marker
                marker=$(psql -tA -c "SELECT 1 FROM _vigil_schema_versions WHERE filename='$f' LIMIT 1" || true)
                if [ "$marker" = "1" ]; then
                  echo "SKIP $f (already applied)"
                  return 0
                fi
                # File-existence check only fires for entries that have
                # NOT been recorded as applied. Genuinely new drift (a
                # filename added to dbInit.sqlFiles without being copied
                # into the chart bundle) still hard-fails loudly. The
                # previous behavior — silently logging "applied with
                # warnings" + INSERTing into _vigil_schema_versions — is
                # what produced the historical ghost rows in the first
                # place; refusing to extend the bug is the whole point of
                # this guard.
                if [ ! -f "/sql/$f" ]; then
                  echo "ERROR: $f is listed in dbInit.sqlFiles but not present in the chart bundle." >&2
                  echo "  helm/vigil/values.yaml dbInit.sqlFiles has likely drifted from" >&2
                  echo "  helm/vigil/files/database-init/. Either copy the file into the" >&2
                  echo "  bundle or remove the entry from values.yaml." >&2
                  return 1
                fi
                echo "APPLY $f"
                if psql -f "/sql/$f"; then
                  echo "  applied cleanly"
                else
                  echo "  applied with warnings (likely tables not yet created by ORM — safe to ignore on first install)"
                fi
                psql -v ON_ERROR_STOP=1 -c "INSERT INTO _vigil_schema_versions (filename) VALUES ('$f') ON CONFLICT (filename) DO NOTHING"
              }

              {{- range .Values.dbInit.sqlFiles }}
              apply {{ . | quote }}
              {{- end }}

              echo "Database initialization complete."
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            {{- toYaml .Values.dbInit.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: sql
          configMap:
            name: {{ include "vigil.dbInit.fullname" . }}-sql
{{- end }}
